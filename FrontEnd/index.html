<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pemesanan - Cafe CP 55</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pelanggan.css">
    <link rel="stylesheet" href="css/modal-checkout.css">
</head>
<body>

    <div class="desktop-container">
        
        <div class="katalog-panel">
            <div class="warkop-header">
                <h1>CAFE CP 55</h1>
                <p>Silahkan Pilih Kategori dan Tambahkan Menu ke Keranjang</p>
            </div>

            <nav>
                <button id="btn-cat-all" class="btn btn-nav-cat" onclick="filterKategori('all')">👁️ Semua Menu</button>
                <button id="btn-cat-makanan" class="btn btn-nav-cat" onclick="filterKategori('makanan')">🍳 Makanan</button>
                <button id="btn-cat-minuman" class="btn btn-nav-cat" onclick="filterKategori('minuman')">☕ Minuman</button>
                <button id="btn-cat-cemilan" class="btn btn-nav-cat" onclick="filterKategori('cemilan')">🍟 Cemilan</button>
            </nav>

            <div id="sec-makanan" class="menu-section">
                <h2 class="category-title">🍳 Makanan</h2>
                <div id="makanan-container"></div>
            </div>

            <div id="sec-minuman" class="menu-section">
                <h2 class="category-title">☕ Minuman</h2>
                <div id="minuman-container"></div>
            </div>

            <div id="sec-cemilan" class="menu-section">
                <h2 class="category-title">🍟 Cemilan</h2>
                <div id="cemilan-container"></div>
            </div>
        </div>

        <div class="cart-panel">
            <h3 class="panel-title">🛒 Keranjang Belanja</h3>
            
            <div class="cart-scroll-area">
                
                <div id="live-cart-items">
                    <p class="empty-text">Belum ada menu yang dipilih.</p>
                </div>

                <div class="cart-form">
                    <div class="form-group">
                        <label>Nama Pembeli:</label>
                        <input type="text" id="buyer-name" class="form-input" placeholder="Masukkan nama Anda...">
                    </div>
                    <div class="form-group">
                        <label>Catatan (Opsional):</label>
                        <input type="text" id="order-notes" class="form-input" placeholder="Contoh: pedas manis, kopi pisah...">
                    </div>
                    
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Metode Pembayaran (Wajib Di Awal):</label>
                        <div style="display: flex; gap: 10px; margin-top: 5px;">
                            <button id="btn-pay-cash" class="btn" style="flex: 1; background: #333; color: white;" onclick="pilihMetodeBayar('CASH')">💵 CASH</button>
                            <button id="btn-pay-qris" class="btn" style="flex: 1; background: #333; color: white;" onclick="pilihMetodeBayar('QRIS')">📱 QRIS</button>
                        </div>
                    </div>

                    <div id="qris-box-area" style="display: none; background: #fff; padding: 12px; border-radius: 8px; text-align: center; margin-top: 12px; border: 2px solid var(--color-brand);">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CafeCP55" alt="QRIS CP 55" style="width: 130px; height: 130px;">
                        <p style="color: #000; font-weight: bold; font-size: 0.85rem; margin-top: 6px; font-family: sans-serif;">NMID: ID102026XXXXX<br>CAFE CP 55 GRESIK</p>
                    </div>
                </div>

            </div> <div class="cart-summary">
                <div class="total-row">
                    <span>Total Bayar:</span>
                    <span id="cart-total-price">Rp 0</span>
                </div>
                <button class="btn btn-brand btn-checkout-block" onclick="prosesKeNotaDigital()">
                    Konfirmasi & Proses Pesanan
                </button>
            </div>
        </div>

    </div>

    <div id="modal-nota" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header" style="text-align: center; color: var(--color-success);">🎉 PESANAN BERHASIL!</div>
            <div id="print-area-nota" class="digital-receipt-wrapper"></div>
            <button class="btn btn-brand" style="width: 100%; padding: 12px; font-size: 1rem;" onclick="selesaiTransaksi()">
                Selesai & Reset Menu
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
